<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专家画像</title>
  <script src="./data.js"></script>
  <style>
    :root{--navy:#16365f;--blue:#2f69e1;--accent:#e86c3a;--ink:#10213c;--muted:#64748b;--panel:#fff;--shadow:0 18px 40px rgba(16,33,60,.10)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f6f9fc,#edf3f8);color:var(--ink)}
    .shell{padding:22px}.hero{padding:28px;border-radius:28px;background:linear-gradient(120deg,#123055,#22487c 62%,#2f69e1);color:#fff;box-shadow:0 22px 46px rgba(18,48,85,.22)}.hero a{display:inline-block;color:#fff;text-decoration:none;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.12);margin-bottom:18px}
    .hero-main{display:flex;gap:20px;align-items:center;flex-wrap:wrap}.avatar{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.18);font-size:34px;font-weight:700}.hero h1{margin:0 0 8px;font-size:34px}.hero p{margin:0;line-height:1.8;color:rgba(255,255,255,.86)}.tags{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.tag{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.14);font-size:12px}
    .grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:22px;margin-top:22px}.card{background:var(--panel);border-radius:24px;box-shadow:var(--shadow);padding:22px}.card h2{margin:0 0 16px}.timeline-item{padding-left:18px;border-left:3px solid rgba(47,105,225,.18);position:relative;margin-bottom:18px}.timeline-item::before{content:"";position:absolute;left:-7px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--accent)}.muted{color:var(--muted);margin-bottom:6px}
    .network-wrap{background:linear-gradient(180deg,#0d1b2a,#122338);border-radius:18px;padding:10px;position:relative}.network-tooltip{position:absolute;display:none;background:rgba(15,23,42,.94);color:#fff;padding:10px 12px;border-radius:12px;font-size:12px;line-height:1.5;pointer-events:none;max-width:220px}svg{width:100%;height:420px;display:block}.link{stroke:rgba(117,167,255,.45)}.node{cursor:pointer}.label{fill:#dce7f5;font-size:12px}.edge-label{fill:#9fc3ff;font-size:11px}
    @media (max-width:1024px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <a href="javascript:history.back()">返回上一页</a>
      <div class="hero-main">
        <div class="avatar" id="avatar"></div>
        <div>
          <h1 id="name"></h1>
          <p id="meta"></p>
          <div class="tags" id="directionTags"></div>
        </div>
      </div>
    </header>
    <main class="grid">
      <section class="card"><h2>参与课题时间线</h2><div id="topicTimeline"></div></section>
      <section class="card"><h2>学术合作网络</h2><div class="network-wrap"><div class="network-tooltip" id="networkTooltip"></div><svg id="networkSvg" viewBox="0 0 420 360" preserveAspectRatio="xMidYMid meet"></svg></div></section>
    </main>
  </div>
  <script>
    const { getExpertByName, TOPICS, buildExpertNetwork } = window.ResearchPlatformData;
    const name = new URLSearchParams(window.location.search).get("name") || "陈知衡";
    const expert = getExpertByName(name) || getExpertByName("陈知衡");
    const relatedTopics = TOPICS.filter((topic) => topic.leadExperts.includes(expert.name) || expert.topics.includes(topic.id)).sort((a,b) => b.year - a.year);
    document.getElementById("avatar").textContent = expert.name.slice(0,1);
    document.getElementById("name").textContent = expert.name;
    document.getElementById("meta").textContent = `${expert.institution} · ${expert.title} · ${expert.profile}`;
    document.getElementById("directionTags").innerHTML = expert.directions.map((direction) => `<span class="tag">${direction}</span>`).join("");
    document.getElementById("topicTimeline").innerHTML = relatedTopics.map((topic) => `<article class="timeline-item"><div class="muted">${topic.year} 年 · ${topic.type}</div><div><strong>${topic.title}</strong></div><div>${topic.direction} · 关键词：${topic.keywords.slice(0,4).join(" / ")}</div></article>`).join("");
    const network = buildExpertNetwork(expert.name);
    const svg = document.getElementById("networkSvg");
    const tooltip = document.getElementById("networkTooltip");
    const nodeByName = new Map(network.nodes.map((node) => [node.name, node]));
    let markup = "";
    network.links.forEach((link) => {
      const source = nodeByName.get(link.source); const target = nodeByName.get(link.target);
      markup += `<line class="link" x1="${source.x}" y1="${source.y}" x2="${target.x}" y2="${target.y}" stroke-width="${1 + link.value}"></line>`;
      markup += `<text class="edge-label" x="${(source.x + target.x) / 2}" y="${(source.y + target.y) / 2 - 4}" text-anchor="middle">${link.value}次</text>`;
    });
    network.nodes.forEach((node) => {
      markup += `<circle class="node" cx="${node.x}" cy="${node.y}" r="${node.value}" fill="${node.category === 'core' ? '#e86c3a' : '#3f82f2'}" data-name="${node.name}" data-institution="${node.institution}" data-directions="${node.directions.join(' / ')}"></circle>`;
      markup += `<text class="label" x="${node.x}" y="${node.y + node.value + 16}" text-anchor="middle">${node.name}</text>`;
    });
    svg.innerHTML = markup;
    svg.querySelectorAll(".node").forEach((node) => {
      node.addEventListener("mousemove", (event) => {
        tooltip.style.display = "block";
        tooltip.style.left = event.offsetX + 16 + "px";
        tooltip.style.top = event.offsetY + 16 + "px";
        tooltip.innerHTML = `<strong>${node.dataset.name}</strong><br>${node.dataset.institution}<br>${node.dataset.directions}`;
      });
      node.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
      node.addEventListener("click", () => { if (node.dataset.name !== expert.name) { window.location.href = `./expert.html?name=${encodeURIComponent(node.dataset.name)}`; } });
    });
  </script>
</body>
</html>
